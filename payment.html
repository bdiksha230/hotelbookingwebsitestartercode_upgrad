<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Booking project of upgrad</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/payment.css">


</head>

<body>
    <div class="page">

        <main>
            <section class="payment_card">
                <div class="container">
                    <div class="row align-item-center justify-content-center">
                        <div class="col-md-8">
                            <div class="card mb-3">
                                <div class="row no-gutters">
                                    <div class="col-md-6">
                                        <img src="https://media-cdn.tripadvisor.com/media/photo-w/17/b3/09/b4/by-the-poolside.jpg"
                                            class="card-img" alt="...">
                                    </div>
                                    <div class="col-md-6 card-body-text">
                                        <div class="card-body">
                                            <h5 class="card-title">Radisson Blu Hotel</h5>
                                            <p>#38 of 1,289 hotels in New Delhi</p>
                                            <p>Nation highway 8, New Delhi 110017 India</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>

                <div class="user-details">
                    <div class="container">
                        <div class="row">
                            <div class="col-lg-4">
                                <p><b>Name : </b> John Doe</p>
                                <p><b>Number of adult : </b> 2 </p>
                                <p><b>Check-in Date : </b> 06/06/2020 </p>
                                <p><b>Check-out Date : </b> 08/06/2020 </p>
                            </div>
                            <div class="col-lg-5">
                                <p><b>Tariff Breakdown : </b> Rs. 1000 x 2 Adult x 5 Nights </p>
                                <p><b>Total Amount : </b> Rs. 10000 </p>
                            </div>
                            <div class="col-lg-3">
                                <button class="btn bg-success text-white">Pay Now</button>
                            </div>
                        </div>
                    </div>
                </div>
            </section>



        </main>


    </div>


    <script src="header.js"></script>
    <script src="footer.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>

</body>

</html>
